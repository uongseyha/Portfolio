<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 760" role="img" aria-labelledby="title desc">
  <title id="title">Seyha Uong profile illustration</title>
  <desc id="desc">Stylized portrait placeholder with initials SU on a gradient background.</desc>
  <defs>
