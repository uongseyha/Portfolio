      <stop offset="0%" stop-color="#0f2748" />
      <stop offset="55%" stop-color="#1e3d6b" />
      <stop offset="100%" stop-color="#2a1f3d" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#49d5ff" />
